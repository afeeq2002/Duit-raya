<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Duit Raya</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
              url('background.jpg') center/cover no-repeat;

  font-family:'Poppins';
  color:white;
}

/* 💸 duit jatuh */
.money {
  position:fixed;
  top:-50px;
  font-size:20px;
  animation: fall linear infinite;
  opacity:0.4;
}

@keyframes fall {
  to { transform: translateY(110vh); }
}

/* CARD */
.card {
  width:300px;
  height:200px;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
  cursor:pointer;

  opacity:0;
  transform:scale(0.7);
}

.card.show {
  animation: cardIn 1s cubic-bezier(0.22,1,0.36,1) forwards;
}

@keyframes cardIn {
  0% {
    opacity:0;
    transform:scale(0.7);
  }
  60% {
    opacity:1;
    transform:scale(1.05);
  }
  100% {
    opacity:1;
    transform:scale(1);
  }
}

.card-inner {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 30px rgba(34,197,94,0.4);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.front { backface-visibility:hidden; }

.back {
  transform:rotateY(180deg);
  backface-visibility:hidden;
}

.card.flipped {
  transform:rotateY(180deg);
}

/* QR */
.qr {
  width:180px;
  border-radius:12px;
  box-shadow:
    0 0 20px rgba(34,197,94,0.6),
    0 0 40px rgba(255,215,0,0.4);
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.06); }
}

/* button */
.button {
  margin-top:20px;
  padding:8px 20px;
  border:1px solid white;
  border-radius:20px;
  font-size:14px;
  opacity:0.8;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div id="card" class="card" onclick="flipCard()">
  <div class="card-inner front">
    <div style="font-family:'Dancing Script';font-size:28px;">
      Untuk Nadd
    </div>

    <div class="button">
      Tekan kalau sudi…
    </div>
  </div>

  <div class="card-inner back">
    <img src="packet.png" class="qr">
    <div style="font-size:13px;margin-top:10px; opacity:0.85;">
      Jangan lupa claim tau 😉
    </div>
  </div>
</div>

<!-- 🎵 SAME MUSIC AS PAGE 3 -->
<audio id="bgMusic" src="music.mp3" loop></audio>

<script>

/* 💸 duit jatuh */
for(let i=0;i<35;i++){
  let d=document.createElement("div");
  d.className="money";
  d.innerHTML="💸";
  d.style.left=Math.random()*100+"vw";
  d.style.animationDuration=(5+Math.random()*4)+"s";
  document.body.appendChild(d);
}

/* show card */
setTimeout(()=>{
  document.getElementById("card").classList.add("show");
},1200);

/* flip */
function flipCard(){
  document.getElementById("card").classList.toggle("flipped");
}

/* play music */
window.onload = () => {

  const music = document.getElementById("bgMusic");
  music.volume = 0.25;
  music.play().catch(()=>{});

};

/* unlock audio */
document.addEventListener("click", () => {
  document.getElementById("bgMusic").play().catch(()=>{});
}, { once: true });

</script>

</body>
</html>
