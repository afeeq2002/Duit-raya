<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:'Cormorant', serif;
}

canvas {
  display:block;
}

/* ⚡ FLASH EFFECT */
#flash {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="flash"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const flash = document.getElementById("flash");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let textParticles = [];

/* 🎆 FIREWORK */
function createFirework() {
  let x = Math.random() * canvas.width;
  let y = Math.random() * canvas.height * 0.5;

  let colors = ["#ff4d4d","#ffd700","#00ffff","#ff66ff","#66ff66","#ffffff"];
  let color = colors[Math.floor(Math.random() * colors.length)];

  for (let i = 0; i < 80; i++) {
    particles.push({
      x, y,
      dx: (Math.random() - 0.5) * 7,
      dy: (Math.random() - 0.5) * 7,
      life: 100,
      color: color,
      size: Math.random()*2 + 1
    });
  }
}

/* 💥 BIG EXPLOSION */
function bigExplosion() {
  let x = canvas.width / 2;
  let y = canvas.height / 2;

  let colors = ["#ffd700","#ffffff","#ff66ff","#00ffff"];

  for (let i = 0; i < 220; i++) {
    let color = colors[Math.floor(Math.random()*colors.length)];

    particles.push({
      x, y,
      dx: (Math.random() - 0.5) * 13,
      dy: (Math.random() - 0.5) * 13,
      life: 120,
      color: color,
      size: Math.random()*3 + 1
    });
  }
}

/* ✨ TEXT PARTICLES */
function createTextParticles() {
  let off = document.createElement("canvas");
  let offCtx = off.getContext("2d");

  off.width = canvas.width;
  off.height = canvas.height;

  offCtx.fillStyle = "white";
  offCtx.font = "italic bold 100px Cormorant";
  offCtx.textAlign = "center";
  offCtx.textBaseline = "middle";

  offCtx.fillText("Nadd", canvas.width/2, canvas.height/2);

  let data = offCtx.getImageData(0,0,canvas.width,canvas.height).data;

  for (let y = 0; y < canvas.height; y += 4) {
    for (let x = 0; x < canvas.width; x += 4) {
      let index = (y * canvas.width + x) * 4;

      if (data[index+3] > 128) {
        textParticles.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          tx: x,
          ty: y,
          color: `hsl(${Math.random()*360}, 100%, 65%)`
        });
      }
    }
  }
}

/* 🎬 ANIMATION */
let mode = "fireworks";

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if (mode === "fireworks") {
    particles.forEach((p, i) => {

      ctx.shadowBlur = 10;
      ctx.shadowColor = p.color;

      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);

      ctx.shadowBlur = 0;

      p.x += p.dx;
      p.y += p.dy;
      p.life--;

      if (p.life <= 0) particles.splice(i,1);
    });
  }

  if (mode === "text") {

    // 💫 subtle zoom
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(1.02,1.02);
    ctx.translate(-canvas.width/2, -canvas.height/2);

    textParticles.forEach(p => {

      ctx.shadowBlur = 8;
      ctx.shadowColor = p.color;

      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 2, 2);

      ctx.shadowBlur = 0;

      p.x += (p.tx - p.x) * 0.03;
      p.y += (p.ty - p.y) * 0.03;
    });

    ctx.restore();
  }

  requestAnimationFrame(animate);
}

/* 🔥 RANDOM FIREWORK */
function randomFireworks(){
  createFirework();
  setTimeout(randomFireworks, 400 + Math.random()*600);
}

randomFireworks();
animate();

/* 💥 TRANSITION: BOOM + FLASH + NADD */
setTimeout(() => {

  // ⚡ FLASH
  flash.style.opacity = "1";
  setTimeout(()=>{
    flash.style.opacity = "0";
  },150);

  // 💥 BOOM
  bigExplosion();

  // 🕰 delay cinematic
  setTimeout(()=>{
    mode = "text";
    particles = [];
    createTextParticles();
  },900);

}, 5500);

/* 👉 CLICK NEXT */
document.addEventListener("click", () => {
  if (mode === "text") {
    window.location.href = "ucapan.html";
  }
});
</script>

</body>
</html>
