<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:'Cormorant', serif;
}

canvas {
  display:block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let textParticles = [];

// FIREWORKS NORMAL
function createFirework() {
  let x = Math.random() * canvas.width;
  let y = Math.random() * canvas.height / 2;

  for (let i = 0; i < 60; i++) {
    particles.push({
      x, y,
      dx: (Math.random() - 0.5) * 6,
      dy: (Math.random() - 0.5) * 6,
      life: 100
    });
  }
}

// DRAW TEXT TO PIXEL
function createTextParticles() {
  let off = document.createElement("canvas");
  let offCtx = off.getContext("2d");

  off.width = canvas.width;
  off.height = canvas.height;

  offCtx.fillStyle = "white";
  offCtx.font = "90px Cormorant";
  offCtx.textAlign = "center";

  offCtx.fillText("Nadd", canvas.width/2, canvas.height/2);

  let data = offCtx.getImageData(0,0,canvas.width,canvas.height).data;

  for (let y = 0; y < canvas.height; y += 6) {
    for (let x = 0; x < canvas.width; x += 6) {
      let index = (y * canvas.width + x) * 4;

      if (data[index+3] > 128) {
        textParticles.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          tx: x,
          ty: y
        });
      }
    }
  }
}

// ANIMATION
let mode = "fireworks";

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if (mode === "fireworks") {
    particles.forEach((p, i) => {
      ctx.fillStyle = "white";
      ctx.fillRect(p.x, p.y, 2, 2);

      p.x += p.dx;
      p.y += p.dy;
      p.life--;

      if (p.life <= 0) particles.splice(i,1);
    });
  }

  if (mode === "text") {
    textParticles.forEach(p => {
      ctx.fillStyle = "white";
      ctx.fillRect(p.x, p.y, 2, 2);

      // move toward target
      p.x += (p.tx - p.x) * 0.05;
      p.y += (p.ty - p.y) * 0.05;
    });
  }

  requestAnimationFrame(animate);
}

setInterval(createFirework, 500);
animate();

// SWITCH TO TEXT
setTimeout(() => {
  mode = "text";
  particles = [];
  createTextParticles();
}, 5000);

// CLICK TO NEXT PAGE
document.addEventListener("click", () => {
  if (mode === "text") {
    window.location.href = "ucapan.html";
  }
});
</script>

</body>
</html>
