<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Hari Raya</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f5132, #198754);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: rgba(0,0,0,0.8);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.8);}
  to {opacity: 1; transform: scale(1);}
}

button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #198754;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* Stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100% {opacity: 0.2;}
  50% {opacity: 1;}
}
</style>
</head>

<body>

<div class="popup" id="popup">
  <div class="popup-content">
    <h1>Selamat Hari Raya Nadd 🌙</h1>
    <p>Maaf zahir & batin</p>
    <p>Ikhlas dari Afeeq 💚</p>

    <!-- Buttons dalam popup -->
    <div>
      <button onclick="showMessage('wish')">🌙 Ucapan</button>
      <button onclick="showMessage('joke')">😆 Joke</button>
      <button onclick="showMessage('special')">💌 Special</button>
    </div>

    <p id="popupText">Pilih mana-mana untuk mula 😎</p>

    <!-- QR Duit Raya -->
    <img id="qrImage" src="https://via.placeholder.com/200x200?text=QR+Demo" style="display:block; margin-top:10px;">

    <br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
window.onload = function() {
  document.getElementById("popup").style.display = "flex";
}

function showMessage(type) {
  const text = {
    wish: "Semoga raya tahun ni penuh kebahagiaan ✨",
    joke: "Kuih raya banyak, tapi paling manis tetap awak 😆",
    special: "Selamat Hari Raya... jujur cakap, rindu awak sikit 😌"
  };
  document.getElementById("popupText").innerText = text[type];
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// Stars
for(let i=0;i<50;i++){
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random()*100+"%";
  star.style.left = Math.random()*100+"%";
  document.body.appendChild(star);
}
</script>

</
</html>
