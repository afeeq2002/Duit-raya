<!DOCTYPE html>
<html>
<head>
  <title>Untuk Awak</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      color:white;
      text-align:center;

      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('background.jpg') center/cover no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    .container {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:15px;
    }

    /* hidden state */
    .hidden {
      opacity:0;
      transform: translateY(-30px);
    }

    .show {
      opacity:1;
      transform: translateY(0);
      transition: all 1s ease;
    }

    .name-btn {
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
      font-size: 24px;

      padding: 16px 32px;
      border-radius: 40px;

      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);

      color: white;
      border: 1px solid rgba(255,255,255,0.3);

      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 280px;

      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .name-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255,255,255,0.25);
    }

    .name-btn::after {
      content: "|";
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .subtitle {
      opacity:0.7;
      font-size:14px;
      letter-spacing:1px;
    }

    .hint {
      opacity:0.5;
      font-size:12px;
    }

    .fade-out {
      opacity:0;
      transition:1s;
    }

  </style>
</head>

<body>

<div class="container" id="main">

  <p id="line1" class="subtitle hidden">a small thing for you 🌙</p>

  <button onclick="startTransition()" id="nameText" class="name-btn hidden"></button>

  <p id="hint" class="hint hidden">(tap perlahan-lahan…)</p>

</div>

<audio id="clickSound" src="sound.mp3" preload="auto"></audio>

<script>

function startTransition(){
  const main = document.getElementById("main");
  let sound = document.getElementById("clickSound");

  sound.volume = 0.4;
  sound.play();

  main.classList.add("fade-out");

  setTimeout(()=>{
    window.location.href="./fireworks.html";
  },1200);
}

/* STEP ANIMATION FLOW */

window.onload = () => {

  // 1️⃣ text jatuh
  setTimeout(()=>{
    document.getElementById("line1").classList.add("show");
  },500);

  // 2️⃣ nama muncul + typing
  setTimeout(()=>{
    document.getElementById("nameText").classList.add("show");
    typeEffect();
  },1500);

  // 3️⃣ hint muncul
  setTimeout(()=>{
    document.getElementById("hint").classList.add("show");
  },3000);

};

/* typing */
const text="Nur Fatin Nadhirah";
let i=0;

function typeEffect(){
  if(i < text.length){
    document.getElementById("nameText").innerHTML += text.charAt(i);
    i++;

    let delay = 100;
    if(i > text.length - 3) delay = 140;

    setTimeout(typeEffect, delay);
  }
}

</script>

</body>
</html>
