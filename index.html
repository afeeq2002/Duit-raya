<!DOCTYPE html>
<html>
<head>
  <title>Untuk Awak</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      color:white;
      text-align:center;

      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('background.jpg') center/cover no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    /* container start kosong */
    .container {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      opacity:0;
    }

    /* fade in container */
    .show-container {
      animation: fadeIn 1.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity:0; }
      to { opacity:1; }
    }

    .hidden {
      opacity:0;
    }

    /* 💥 DROP + BOUNCE */
    @keyframes dropBounce {
      0% {
        opacity:0;
        transform: translateY(-120px);
      }
      70% {
        opacity:1;
        transform: translateY(10px);
      }
      85% {
        transform: translateY(-4px);
      }
      100% {
        transform: translateY(0);
      }
    }

    .drop {
      animation: dropBounce 1.8s ease forwards;
    }

    .name-btn {
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
      font-size: 24px;

      padding: 16px 32px;
      border-radius: 40px;

      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);

      color: white;
      border: 1px solid rgba(255,255,255,0.3);

      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 280px;

      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .name-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255,255,255,0.25);
    }

    .name-btn::after {
      content: "|";
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .subtitle {
      opacity:0.7;
      font-size:14px;
      letter-spacing:1px;
    }

    .hint {
      opacity:0.5;
      font-size:12px;
    }

    .fade-out {
      opacity:0;
      transition:1s;
    }

  </style>
</head>

<body>

<div class="container" id="main">

  <p id="line1" class="subtitle hidden">a small thing for you 🌙</p>

  <button onclick="startTransition()" id="nameText" class="name-btn hidden"></button>

  <p id="hint" class="hint hidden">(tap perlahan-lahan…)</p>

</div>

<audio id="clickSound" src="sound.mp3"></audio>

<script>

function startTransition(){
  const main = document.getElementById("main");
  let sound = document.getElementById("clickSound");

  sound.volume = 0.4;
  sound.play();

  main.classList.add("fade-out");

  setTimeout(()=>{
    window.location.href="./fireworks.html";
  },1200);
}

/* 🎬 FULL FLOW */
window.onload = () => {

  // 💤 kosong dulu
  setTimeout(()=>{

    const main = document.getElementById("main");
    main.classList.add("show-container");

    // 1️⃣ text jatuh
    setTimeout(()=>{
      const el = document.getElementById("line1");
      el.classList.remove("hidden");
      el.classList.add("drop");
    },500);

    // 2️⃣ nama jatuh + typing
    setTimeout(()=>{
      const btn = document.getElementById("nameText");
      btn.classList.remove("hidden");
      btn.classList.add("drop");
      typeEffect();
    },1800);

    // 3️⃣ hint
    setTimeout(()=>{
      const hint = document.getElementById("hint");
      hint.classList.remove("hidden");
      hint.classList.add("drop");
    },3800);

  },1500); // delay kosong

};

/* ✍️ typing slow */
const text="Nur Fatin Nadhirah";
let i=0;

function typeEffect(){
  if(i < text.length){
    document.getElementById("nameText").innerHTML += text.charAt(i);
    i++;

    let delay = 140;

    if(i > text.length - 4){
      delay = 180;
    }

    setTimeout(typeEffect, delay);
  }
}

</script>

</body>
</html>
