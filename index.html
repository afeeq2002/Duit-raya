<!DOCTYPE html>
<html>
<head>
  <title>Untuk Awak</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      color:white;
      text-align:center;

      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('background.jpg') center/cover no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    .container {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      opacity:0;
    }

    .show-container {
      animation: fadeIn 1.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity:0; }
      to { opacity:1; }
    }

    .fade-in {
      opacity:0;
      animation: fadeIn 1.2s ease forwards;
    }

    /* 💥 bounce nama */
    @keyframes bounce {
      0% { opacity:0; transform: translateY(-100px); }
      60% { opacity:1; transform: translateY(8px); }
      80% { transform: translateY(-4px); }
      100% { transform: translateY(0); }
    }

    .bounce {
      animation: bounce 1.6s ease forwards;
    }

    .hidden {
      opacity:0;
    }

    .name-btn {
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
      font-size: 24px;

      padding: 16px 32px;
      border-radius: 40px;

      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);

      color: white;
      border: 1px solid rgba(255,255,255,0.3);

      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 280px;

      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .name-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }

    .name-btn::after {
      content: "|";
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .subtitle {
      opacity:0.7;
      font-size:14px;
    }

    /* 💥 HINT FINAL (animation only) */
    #hint {
      opacity:0;
      font-size:12px;
    }

    .show-hint {
      animation: fadeIn 1.2s ease forwards;
    }

    .fade-out {
      opacity:0;
      transition:1s;
    }

  </style>
</head>

<body>

<div class="container" id="main">

  <p id="line1" class="subtitle hidden">a small thing for you 🌙</p>

  <button onclick="startTransition()" id="nameText" class="name-btn hidden"></button>

  <p id="hint">(tap when you're ready…)</p>

</div>

<audio id="clickSound" src="sound.mp3"></audio>

<script>

function startTransition(){
  const main = document.getElementById("main");
  let sound = document.getElementById("clickSound");

  sound.volume = 0.4;
  sound.play();

  main.classList.add("fade-out");

  setTimeout(()=>{
    window.location.href="./fireworks.html";
  },1200);
}

window.onload = () => {

  // 💤 kosong dulu
  setTimeout(()=>{

    const main = document.getElementById("main");
    main.classList.add("show-container");

    // text
    setTimeout(()=>{
      const el = document.getElementById("line1");
      el.classList.remove("hidden");
      el.classList.add("fade-in");
    },600);

    // nama
    setTimeout(()=>{
      const btn = document.getElementById("nameText");
      btn.classList.remove("hidden");
      btn.classList.add("bounce");
      typeEffect();
    },2000);

  },2500);

};

/* typing */
const text="Nur Fatin Nadhirah";
let i=0;

function typeEffect(){
  if(i < text.length){
    document.getElementById("nameText").innerHTML += text.charAt(i);
    i++;

    let delay = 140;
    if(i > text.length - 4) delay = 180;

    setTimeout(typeEffect, delay);

  } else {
    // 💥 ONLY here hint keluar
    setTimeout(()=>{
      document.getElementById("hint").classList.add("show-hint");
    },700);
  }
}

</script>

</body>
</html>
