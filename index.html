<!DOCTYPE html>
<html>
<head>
<title>Untuk Awak</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
  text-align:center;
  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url('background.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Container fade */
.container {
  transition: opacity 1s ease;
}

.fade-out {
  opacity: 0;
}

/* Button style */
.name-btn {
  padding: 14px 28px;
  font-size: 20px;
  border: none;
  border-radius: 30px;
  background: rgba(255,255,255,0.9);
  color: #14532d;
  cursor: pointer;
  transition: all 0.3s ease;
}

.name-btn:hover {
  background: #ffffff;
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,255,255,0.6);
}
</style>

</head>

<body>

<div class="container" id="main">

  <p style="opacity:0.7;">a small thing for you 🌙</p>

  <!-- BUTTON NAMA -->
  <button onclick="startTransition()" class="name-btn">
    Nur Fatin Nadhirah 
  </button>

  <p style="opacity:0.5;">(tap untuk buka)</p>

</div>

<script>
function startTransition() {
  const main = document.getElementById("main");

  // fade out animation
  main.classList.add("fade-out");

  // lepas 1 saat pergi next page
  setTimeout(() => {
    window.location.href = "ucapan.html";
  }, 1000);
}
</script>

</body>
</html>
