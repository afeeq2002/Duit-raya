<!DOCTYPE html>
<html>
<head>
  <title>Untuk Awak</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      color:white;
      text-align:center;

      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('background.jpg') center/cover no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    .container {
      transition: opacity 1s ease;
    }

    .fade-out {
      opacity: 0;
    }

    /* Button style (glass effect) */
    .name-btn {
      font-family: 'Cormorant', serif;
      letter-spacing: 1px;
      font-size: 22px;

      padding: 14px 28px;
      border-radius: 30px;

      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      color: white;
      border: 1px solid rgba(255,255,255,0.3);

      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 260px;
    }

    .name-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }

    /* Cursor blinking */
    .name-btn::after {
      content: "|";
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container" id="main">

    <p style="opacity:0.7;">a small thing for you 🌙</p>

    <!-- BUTTON -->
    <button onclick="startTransition()" class="name-btn" id="nameText"></button>

    <p style="opacity:0.5;">(tap untuk buka)</p>

  </div>

  <!-- SOUND -->
  <audio id="clickSound" src="sound.mp3" preload="auto"></audio>

  <script>
    function startTransition() {
      const main = document.getElementById("main");
      let sound = document.getElementById("clickSound");

      sound.volume = 0.4;
      sound.play();

      setTimeout(() => {
        main.classList.add("fade-out");
      }, 150);

      setTimeout(() => {
        window.location.href = "ucapan.html";
      }, 1100);
    }

    // Typing effect
    const text = "Nur Fatin Nadhirah";
    let i = 0;

    function typeEffect() {
      if (i < text.length) {
        document.getElementById("nameText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 150);
      }
    }

    window.onload = typeEffect;
  </script>

</body>
</html>
