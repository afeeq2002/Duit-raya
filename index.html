<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Untuk Awak</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Cormorant', serif;
  color:white;
  text-align:center;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
              url('background.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.container {
  opacity:0;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  to { opacity:1; }
}

.fade-out {
  opacity:0;
  transition:opacity 1s ease;
}

.name-btn {
  font-family:'Cormorant', serif;
  font-size:24px;
  letter-spacing:1px;
  padding:14px 30px;
  border-radius:40px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.3);
  color:white;
  cursor:pointer;
  transition: all 0.3s ease;
  min-width:260px;
}

.name-btn:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.05);
}

#nameText {
  text-shadow: 0 0 8px rgba(255,255,255,0.4),
               0 0 16px rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container" id="main">
  <p style="opacity:0.7;">a small thing for you 🌙</p>

  <button onclick="startTransition()" class="name-btn" id="nameText"></button>

  <p style="opacity:0.5;">(tap untuk buka)</p>
</div>

<!-- AUDIO -->
<audio id="typeSound" src="type.mp3" preload="auto"></audio>
<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<script>
const text = "Nur Fatin Nadhirah";
let i = 0;

// enable sound after user interaction (important for iPhone/iPad)
let soundEnabled = false;
document.addEventListener("click", () => {
  soundEnabled = true;
});

// typing effect
function typeEffect() {
  if (i < text.length) {

    document.getElementById("nameText").innerHTML += text.charAt(i);

    let t = document.getElementById("typeSound");

    if (soundEnabled && i % 4 === 0) {
      t.currentTime = 0;
      t.volume = 0.07;
      t.play().catch(()=>{});
    }

    i++;
    setTimeout(typeEffect, Math.random() * 80 + 120);
  }
}

// delay start (cinematic)
window.onload = () => {
  setTimeout(typeEffect, 500);
};

// click transition
function startTransition() {
  const main = document.getElementById("main");

  let c = document.getElementById("clickSound");
  if (soundEnabled) {
    c.volume = 0.2;
    c.play().catch(()=>{});
  }

  main.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = "ucapan.html";
  }, 1000);
}
</script>

</body>
</html>
