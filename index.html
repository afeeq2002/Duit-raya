<!DOCTYPE html>
<html>
<head>
<title>Selamat Hari Raya</title>
<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
  text-align:center;
  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url('background.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.container {
  transition: opacity 1s ease;
}

.fade-out {
  opacity: 0;
}
</style>
</head>

<body>

<div class="container" id="main">
  <h1>Selamat Hari Raya 🌙</h1>
  <p>Khas untuk</p>

  <h2 onclick="startTransition()" style="cursor:pointer;">
    Nadd 💚
  </h2>

  <p style="opacity:0.7;">(tap nama)</p>
</div>

<script>
function startTransition() {
  const main = document.getElementById("main");

  // fade out
  main.classList.add("fade-out");

  // lepas 1 saat, pergi page 2
  setTimeout(() => {
    window.location.href = "ucapan.html";
  }, 1000);
}
</script>

</body>
</html>
