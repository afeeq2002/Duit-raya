<!DOCTYPE html>
<html>
<head>
<title>Untuk Awak</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
  text-align:center;
  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url('background.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Container fade */
.container {
  transition: opacity 1s ease;
}

.fade-out {
  opacity: 0;
}

/* Button style */
.name-btn {
  padding: 14px 28px;
  font-size: 20px;
  border: none;
  border-radius: 30px;

  background: rgba(255, 255, 255, 0.15); /* transparent */
  backdrop-filter: blur(10px); /* glass effect */
  -webkit-backdrop-filter: blur(10px);

  color: #ffffff;
  border: 1px solid rgba(255,255,255,0.3);

  cursor: pointer;
  transition: all 0.3s ease;
}
}
</style>

</head>

<body>

<div class="container" id="main">

  <p style="opacity:0.7;">a small thing for you 🌙</p>

  <!-- BUTTON NAMA -->
  <button onclick="startTransition()" class="name-btn">
    Nur Fatin Nadhirah 
  </button>

  <p style="opacity:0.5;">(tap untuk buka)</p>

</div>

<script>
function startTransition() {
  const main = document.getElementById("main");

  // fade out animation
  main.classList.add("fade-out");

  // lepas 1 saat pergi next page
  setTimeout(() => {
    window.location.href = "ucapan.html";
  }, 1000);
}
<script>
function startTransition() {
  const main = document.getElementById("main");

  main.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = "ucapan.html";
  }, 1000);
}

// 👉 TAMBAH KAT SINI (bawah function)
const text = "Nur Fatin Nadhirah";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("nameText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 80);
  }
}

window.onload = typeEffect;
</script>

</body>
</html>
