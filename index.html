<!DOCTYPE html>
<html>
<head>
  <title>Untuk Awak</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      color:white;
      text-align:center;

      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('background.jpg') center/cover no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    .container {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
    }

    .hidden {
      opacity:0;
    }

    /* 💥 DROP + BOUNCE */
    @keyframes dropBounce {
      0% {
        opacity:0;
        transform: translateY(-120px);
      }
      70% {
        opacity:1;
        transform: translateY(10px);
      }
      85% {
        transform: translateY(-4px);
      }
      100% {
        transform: translateY(0);
      }
    }

    .drop {
      animation: dropBounce 1.8s ease forwards;
    }

    .name-btn {
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
      font-size: 24px;

      padding: 16px 32px;
      border-radius: 40px;

      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);

      color: white;
      border: 1px solid rgba(255,255,255,0.3);

      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 280px;

      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .name-btn::after {
      content: "|";
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .subtitle {
      opacity:0.7;
      font-size:14px;
      letter-spacing:1px;
    }

    .hint {
      opacity:0.5;
      font-size:12px;
    }

    .fade-out {
      opacity:0;
      transition:1s;
    }

  </style>
</head>

<body>

<div class="container" id="main">

  <p id="line1" class="subtitle hidden">a small thing for you 🌙</p>

  <button onclick="startTransition()" id="nameText" class="name-btn hidden"></button>

  <p id="hint" class="hint hidden">(tap perlahan-lahan…)</p>

</div>

<audio id="clickSound" src="sound.mp3"></audio>

<script>

function startTransition(){
  const main = document.getElementById("main");
  let sound = document.getElementById("clickSound");

  sound.volume = 0.4;
  sound.play();

  main.classList.add("fade-out");

  setTimeout(()=>{
    window.location.href="./fireworks.html";
  },1200);
}

/* 🎬 FLOW IKUT REQUEST KAU */
window.onload = () => {

  // 💤 kosong dulu (important feel)
  setTimeout(()=>{

    // 1️⃣ text jatuh
    document.getElementById("line1").classList.remove("hidden");
    document.getElementById("line1").classList.add("drop");

  },1500);

  // 2️⃣ nama jatuh + typing slow
  setTimeout(()=>{
    const btn = document.getElementById("nameText");
    btn.classList.remove("hidden");
    btn.classList.add("drop");
    typeEffect();
  },3200);

  // 3️⃣ hint last
  setTimeout(()=>{
    document.getElementById("hint").classList.remove("hidden");
    document.getElementById("hint").classList.add("drop");
  },5500);

};

/* ✍️ TYPING SLOW VERSION */
const text="Nur Fatin Nadhirah";
let i=0;

function typeEffect(){
  if(i < text.length){
    document.getElementById("nameText").innerHTML += text.charAt(i);
    i++;

    let delay = 140; // slow base

    // slow lagi dekat ending
    if(i > text.length - 4){
      delay = 180;
    }

    setTimeout(typeEffect, delay);
  }
}

</script>

</body>
</html>
