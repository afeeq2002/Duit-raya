<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Awak 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Cormorant', serif;
  background: black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  text-align:center;
}

canvas {
  position:fixed;
  top:0;
  left:0;
}

.text {
  position:relative;
  z-index:2;
  opacity:0;
  animation: fadeIn 3s ease forwards;
}

@keyframes fadeIn {
  to { opacity:1; }
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="text">
  <h2>Selamat Hari Raya 🌙</h2>
  <p>Maaf zahir dan batin…</p>
  <p>Semoga hari-hari awak sentiasa tenang dan indah ✨</p>
</div>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework() {
  let x = Math.random() * canvas.width;
  let y = Math.random() * canvas.height / 2;

  for (let i = 0; i < 30; i++) {
    particles.push({
      x: x,
      y: y,
      dx: (Math.random() - 0.5) * 4,
      dy: (Math.random() - 0.5) * 4,
      life: 100
    });
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p, i) => {
    ctx.fillStyle = "white";
    ctx.fillRect(p.x, p.y, 2, 2);

    p.x += p.dx;
    p.y += p.dy;
    p.life--;

    if (p.life <= 0) particles.splice(i,1);
  });

  requestAnimationFrame(animate);
}

setInterval(createFirework, 1200);
animate();
</script>

</body>
</html>
