<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Awak 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('background.jpg') center/cover no-repeat;

  color:white;
  font-family:'Poppins', sans-serif;
}

.card {
  max-width: 600px;
  padding: 30px;
  border-radius: 20px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);

  opacity:0;
  transform: translateY(30px);
  animation: fadeUp 2s ease forwards;
}

h1 {
  font-family: 'Dancing Script', cursive;
  font-size: 40px;
  margin-bottom: 20px;
}

p {
  line-height:1.8;
  font-size:16px;
  opacity:0.9;
  white-space: pre-line;
}

@keyframes fadeUp {
  to {
    opacity:1;
    transform: translateY(0);
  }
}

/* ===== ENVELOPE ===== */
.envelope {
  position: fixed;
  bottom: 40px;
  right: 40px;

  width: 80px;
  height: 60px;

  cursor: pointer;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.5s ease;
}

.envelope.show {
  opacity: 1;
  transform: scale(1);
}

.body-env {
  width: 100%;
  height: 100%;
  background: #0f9d58;
  border-radius: 6px;
  position: absolute;
}

.flap {
  width: 100%;
  height: 50%;
  background: #34d399;

  position: absolute;
  top: 0;
  left: 0;

  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 0.6s ease;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}
</style>
</head>

<body>

<div class="card">
  <h1>Untuk Nadd 🌙</h1>
  <p id="text"></p>
</div>

<!-- ENVELOPE -->
<div id="envelope" class="envelope">
  <div class="flap"></div>
  <div class="body-env"></div>
</div>

<script>

// MESSAGE
const message = `Selamat Hari Raya ✨

Semoga hari-hari Nadd sentiasa dipenuhi dengan kebahagiaan,
dan senyuman yang takkan pernah hilang.

Kadang benda kecil pun boleh buat hari jadi lebih tenang,

Kalau ada apa-apa yang pernah buat Nadd terasa,
Minta maaf yaa🙏🏻
Mungkin ada kata-kata atau perbuatan yang tak sepatutnya
Harap boleh dimaafkan ya

Semoga segalanya akan menjadi lebih baik dari sebelumya..✨

Apa yang saya buat ni mungkin simple je,
tapi harap boleh buat awak tersenyum sikit hari ni`;

// TYPE EFFECT
let i = 0;

function typeEffect() {
  if (i < message.length) {
    let char = message.charAt(i);
    document.getElementById("text").innerHTML += char;
    i++;

    let delay = 70;

    if (char === "," || char === ".") delay = 200;
    if (char === "\n") delay = 500;

    setTimeout(typeEffect, delay);

  } else {
    // show envelope bila habis typing
    document.getElementById("envelope").classList.add("show");
  }
}

// start typing
setTimeout(typeEffect, 1500);

// CLICK ENVELOPE
document.getElementById("envelope").addEventListener("click", () => {
  let env = document.getElementById("envelope");

  env.classList.add("open");

  setTimeout(() => {
    window.location.href = "duit.html";
  }, 800);
});

</script>

</body>
</html>
