<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Nadd 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background: linear-gradient(black, #111);
  color:white;
  font-family:'Poppins', sans-serif;
}

.card {
  max-width:600px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
}

h1 {
  font-family:'Dancing Script', cursive;
  font-size:40px;
}

p {
  white-space:pre-line;
  line-height:1.7;
}

/* ENVELOPE */
.envelope {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);

  width:40vw;
  height:28vw;
  max-width:500px;
  max-height:350px;

  opacity:0;
  cursor:pointer;
  transition:0.6s;
}

.envelope.show {
  opacity:1;
  transform:translate(-50%,-50%) scale(1.5);
}

.envelope.pop {
  transform:translate(-50%,-50%) scale(1);
}

.body-env {
  width:100%;
  height:100%;
  background:linear-gradient(#111,#222);
  border:2px solid gold;
  border-radius:12px;
}

.flap {
  height:50%;
  background:#222;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transition:0.6s;
}

.envelope.open .flap {
  transform:rotateX(180deg);
}
</style>
</head>

<body>

<div class="card">
  <h1>Untuk Nadd 🌙</h1>
  <p id="text"></p>
</div>

<div id="envelope" class="envelope">
  <div class="flap"></div>
  <div class="body-env"></div>
</div>

<script>

const message = `Selamat Hari Raya ✨

Semoga hari-hari Nadd sentiasa dipenuhi dengan kebahagiaan,
dan senyuman yang takkan pernah hilang.

Kadang benda kecil pun boleh buat hari jadi lebih tenang,

Kalau ada apa-apa yang pernah buat Nadd terasa,
Minta maaf yaa🙏🏻
Mungkin ada kata-kata atau perbuatan yang tak sepatutnya
Harap boleh dimaafkan ya

Semoga segalanya akan menjadi lebih baik dari sebelumnya..✨`;

let i = 0;

function typeEffect(){
  const textEl = document.getElementById("text");

  if(i < message.length){
    let char = message.charAt(i);
    textEl.innerHTML += char;
    i++;

    let delay = 70;
    if(char === "\n") delay = 400;

    setTimeout(typeEffect, delay);

  } else {
    showEnvelope();
  }
}

function showEnvelope(){
  const env = document.getElementById("envelope");

  setTimeout(()=>{
    env.classList.add("show");

    setTimeout(()=>{
      env.classList.add("pop");
    },200);

  },1500);
}

document.getElementById("envelope").onclick = () => {
  const env = document.getElementById("envelope");

  env.classList.add("open");

  setTimeout(()=>{
    window.location.href = "duit.html";
  },2000);
};

setTimeout(typeEffect,1000);

</script>

</body>
</html>
