<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Nadd 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url('background.jpg') center/cover no-repeat;

  color:white;
  font-family:'Poppins', sans-serif;
}

/* CARD */
.card {
  max-width:600px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1 {
  font-family:'Dancing Script', cursive;
  font-size:40px;
}

p {
  white-space:pre-line;
  line-height:1.7;
}

/* ENVELOPE CENTER */
.envelope {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.6);
  width:260px;
  height:160px;
  opacity:0;
  cursor:pointer;
  transition:0.6s ease;
}

.envelope.show {
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
  box-shadow:0 10px 40px rgba(0,0,0,0.6),
             0 0 25px rgba(255,215,0,0.25);
}

/* BODY DESIGN UPGRADE */
.body-env {
  width:100%;
  height:100%;
  background: linear-gradient(135deg,#064e3b,#065f46);
  border:2px solid gold;
  border-radius:12px;
  position:relative;
  z-index:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* TEXT TYPE */
#envText {
  font-family:'Dancing Script';
  font-size:22px;
  color:#facc15;
  letter-spacing:1px;
}

/* FLAP */
.flap {
  position:absolute;
  width:100%;
  height:100%;
  background:#e5e5e5;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.6s ease;
  z-index:2;
}

.envelope.open .flap {
  transform:rotateX(180deg);
}

/* 💸 STORM MONEY */
.money-fly {
  position:fixed;
  pointer-events:none;
  animation: burst 1.8s ease-out forwards;
}

@keyframes burst {
  0% {
    transform: translate(0,0) scale(0.5);
    opacity:0;
  }
  30% {
    opacity:1;
  }
  100% {
    transform: translate(var(--x), var(--y)) scale(1.2) rotate(360deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>Untuk Nadd 🌙</h1>
  <p id="text"></p>
</div>

<div id="envelope" class="envelope">
  <div class="flap"></div>
  <div class="body-env">
    <div id="envText"></div>
  </div>
</div>

<audio id="sound" src="sound.mp3"></audio>

<script>

const message = `Selamat Hari Raya ✨

Semoga hari-hari Nadd sentiasa dipenuhi dengan kebahagiaan,
dan senyuman yang takkan pernah hilang.

Kadang benda kecil pun boleh buat hari jadi lebih tenang,

Kalau ada apa-apa yang pernah buat Nadd terasa,
Minta maaf yaa🙏🏻
Mungkin ada kata-kata atau perbuatan yang tak sepatutnya
Harap boleh dimaafkan ya

Semoga segalanya akan menjadi lebih baik dari sebelumnya..✨`;

let i = 0;

function typeEffect(){
  const textEl = document.getElementById("text");

  if(i < message.length){
    let char = message.charAt(i);
    textEl.innerHTML += char;
    i++;

    let delay = 60;
    if(char === "\n") delay = 300;

    setTimeout(typeEffect, delay);

  } else {
    showEnvelope();
  }
}

/* ENVELOPE TEXT TYPE */
function typeEnvelopeText(){
  const text = "Selamat Hari Raya ✨";
  const el = document.getElementById("envText");
  let i = 0;

  function type(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 80);
    }
  }

  type();
}

/* DELAY + POP */
function showEnvelope(){
  const env = document.getElementById("envelope");

  setTimeout(()=>{
    env.classList.add("show");
    setTimeout(typeEnvelopeText,400);
  },2000);
}

document.getElementById("envelope").onclick = () => {
  const env = document.getElementById("envelope");

  env.classList.add("open");
  document.getElementById("sound").play();

  /* 💸 STORM EFFECT FULL SCREEN */
  for(let i=0;i<90;i++){
    let d = document.createElement("div");
    d.className = "money-fly";
    d.innerHTML = Math.random() > 0.5 ? "💵" : "💸";

    d.style.left = (window.innerWidth/2) + "px";
    d.style.top = (window.innerHeight/2) + "px";

    let x = (Math.random() - 0.5) * 1000;
    let y = (Math.random() - 0.5) * 1000;

    d.style.setProperty('--x', x + "px");
    d.style.setProperty('--y', y + "px");

    d.style.fontSize = (20 + Math.random()*25) + "px";

    document.body.appendChild(d);

    setTimeout(()=>d.remove(),2000);
  }

  setTimeout(()=>{
    window.location.href = "duit.html";
  },2200);
};

setTimeout(typeEffect,1000);

</script>

</body>
</html>
