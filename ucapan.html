<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>nadd </title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('background.jpg') center/cover no-repeat;

  color:white;
  font-family:'Poppins', sans-serif;
}

/* CARD */
.card {
  max-width: 600px;
  padding: 30px;
  border-radius: 20px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);

  opacity:0;
  transform: translateY(30px);
  animation: fadeUp 2s ease forwards;
}

.blur-bg {
  filter: blur(6px);
  transition: filter 0.5s ease;
}

h1 {
  font-family: 'Dancing Script', cursive;
  font-size: 40px;
  margin-bottom: 20px;
}

p {
  line-height:1.8;
  font-size:16px;
  opacity:0.9;
  white-space: pre-line;
}

@keyframes fadeUp {
  to {
    opacity:1;
    transform: translateY(0);
  }
}

/* ===== SAMPAUL RAYA ===== */
.envelope {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);

  width: 160px;
  height: 110px;

  cursor: pointer;
  opacity: 0;
  transition: all 0.6s ease;
}

.envelope.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1.2);
  box-shadow: 0 0 30px rgba(34,197,94,0.8);
}

.envelope.pop {
  transform: translate(-50%, -50%) scale(1);
}

.body-env {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #065f46, #16a34a);
  border-radius: 12px;
  position: absolute;
  border: 2px solid gold;
}

.pattern {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,215,0,0.15) 10%, transparent 60%);
}

.label {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
  font-size: 14px;
  color: gold;
  font-family: 'Dancing Script', cursive;
}

.flap {
  width: 100%;
  height: 55%;
  background: linear-gradient(135deg, #22c55e, #4ade80);

  position: absolute;
  top: 0;
  left: 0;

  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 0.6s ease;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

/* ===== DUIT ===== */
#moneyContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.money {
  position: absolute;
  font-size: 26px;
  animation: flyOut 1.5s ease-out forwards;
}

@keyframes flyOut {
  0% {
    transform: translate(0,0) scale(1);
    opacity:1;
  }
  100% {
    transform: translate(var(--x), var(--y)) rotate(360deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>Untuk Nadd 🌙</h1>
  <p id="text"></p>
</div>

<!-- ENVELOPE -->
<div id="envelope" class="envelope">
  <div class="flap"></div>
  <div class="body-env"></div>
  <div class="pattern"></div>
  <div class="label">Selamat Hari Raya</div>
</div>

<!-- DUIT -->
<div id="moneyContainer"></div>

<!-- SOUND -->
<audio id="tingSound" src="ting.mp3" preload="auto"></audio>

<script>

const message = `Selamat Hari Raya ✨

Semoga hari-hari Nadd sentiasa dipenuhi dengan kebahagiaan,
dan senyuman yang takkan pernah hilang.

Kadang benda kecil pun boleh buat hari jadi lebih tenang,

Kalau ada apa-apa yang pernah buat Nadd terasa,
Minta maaf yaa🙏🏻
Mungkin ada kata-kata atau perbuatan yang tak sepatutnya
Harap boleh dimaafkan ya

Semoga segalanya akan menjadi lebih baik dari sebelumya..✨
`;

let i = 0;

function typeEffect() {
  if (i < message.length) {
    let char = message.charAt(i);
    document.getElementById("text").innerHTML += char;
    i++;

    let delay = 70;
    if (char === "," || char === ".") delay = 200;
    if (char === "\n") delay = 500;

    setTimeout(typeEffect, delay);

  } else {
    let env = document.getElementById("envelope");
    let card = document.querySelector(".card");
    let sound = document.getElementById("tingSound");

    card.classList.add("blur-bg");

    sound.currentTime = 0;
    sound.volume = 0.4;
    sound.play().catch(()=>{});

    setTimeout(() => {
      env.classList.add("show");

      setTimeout(() => {
        env.classList.add("pop");
      }, 200);

    }, 400);
  }
}

setTimeout(typeEffect, 1500);

// 💸 DUIT DARI SAMPAUL
function createMoney(x,y){
  let money=document.createElement("div");
  money.className="money";

  let symbols=["💸","💵","💰"];
  money.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];

  money.style.left=x+"px";
  money.style.top=y+"px";

  let rx=(Math.random()-0.5)*1600;
  let ry=(Math.random()-0.5)*1600;

  money.style.setProperty('--x',rx+"px");
  money.style.setProperty('--y',ry+"px");

  money.style.fontSize=(Math.random()*30+20)+"px";

  document.body.appendChild(money);

  setTimeout(()=>money.remove(),2500);
}
  }
}

// CLICK

  dropMoneyFromEnvelope();

  setTimeout(() => {
    window.location.href = "duit.html";
  }, 1800);
});

</script>

</body>
</html>
