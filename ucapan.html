<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Nadd 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url('background.jpg') center/cover no-repeat;

  color:white;
  font-family:'Poppins', sans-serif;
}

/* CARD */
.card {
  max-width:600px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1 {
  font-family:'Dancing Script', cursive;
  font-size:40px;
}

p {
  white-space:pre-line;
  line-height:1.7;
}

/* ENVELOPE (CENTER) */
.envelope {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.6);

  width:240px;
  height:150px;

  opacity:0;
  cursor:pointer;
  transition:0.6s ease;
}

/* POP ANIMATION */
.envelope.show {
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* BODY */
.body-env {
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#ffffff,#f3f3f3);
  border-radius:12px;
  position:relative;
  z-index:1;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Dancing Script';
  font-size:22px;
  color:#14532d;
}

/* TEXT ON ENVELOPE */
.body-env::after {
  content:"Selamat Hari Raya ✨";
}

/* FLAP */
.flap {
  position:absolute;
  width:100%;
  height:100%;
  background:#e5e5e5;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.6s ease;
  z-index:2;
}

/* OPEN */
.envelope.open .flap {
  transform:rotateX(180deg);
}

/* 💸 MONEY FLY */
.money-fly {
  position:fixed;
  pointer-events:none;
  animation: fly 2s ease-out forwards;
}

@keyframes fly {
  0% {
    transform: translateY(0) scale(0.5);
    opacity: 0;
  }
  30% {
    opacity: 1;
  }
  100% {
    transform: translateY(-500px) scale(1.3) rotate(25deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>Untuk Nadd 🌙</h1>
  <p id="text"></p>
</div>

<div id="envelope" class="envelope">
  <div class="flap"></div>
  <div class="body-env"></div>
</div>

<audio id="sound" src="sound.mp3"></audio>

<script>

const message = `Selamat Hari Raya ✨

Semoga hari-hari Nadd sentiasa dipenuhi dengan kebahagiaan,
dan senyuman yang takkan pernah hilang.

Kadang benda kecil pun boleh buat hari jadi lebih tenang,

Kalau ada apa-apa yang pernah buat Nadd terasa,
Minta maaf yaa🙏🏻
Mungkin ada kata-kata atau perbuatan yang tak sepatutnya
Harap boleh dimaafkan ya

Semoga segalanya akan menjadi lebih baik dari sebelumnya..✨`;

let i = 0;

function typeEffect(){
  const textEl = document.getElementById("text");

  if(i < message.length){
    let char = message.charAt(i);
    textEl.innerHTML += char;
    i++;

    let delay = 60;
    if(char === "\n") delay = 300;

    setTimeout(typeEffect, delay);

  } else {
    showEnvelope();
  }
}

/* DELAY + POP */
function showEnvelope(){
  const env = document.getElementById("envelope");

  setTimeout(()=>{
    env.classList.add("show");
  },2000);
}

document.getElementById("envelope").onclick = () => {
  const env = document.getElementById("envelope");

  env.classList.add("open");
  document.getElementById("sound").play();

  /* 💸 DUIT KELUAR DARI ENVELOPE (BANYAK) */
  for(let i=0;i<60;i++){
    let d = document.createElement("div");
    d.className = "money-fly";
    d.innerHTML = "💵";

    d.style.left = (window.innerWidth/2 + (Math.random()*200 -100)) + "px";
    d.style.top = (window.innerHeight/2 + (Math.random()*100)) + "px";
    d.style.fontSize = (20 + Math.random()*25) + "px";

    document.body.appendChild(d);

    setTimeout(()=>d.remove(),2000);
  }

  setTimeout(()=>{
    window.location.href = "duit.html";
  },2200);
};

setTimeout(typeEffect,1000);

</script>

</body>
</html>
