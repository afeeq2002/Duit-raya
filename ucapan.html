<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Awak 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('background.jpg') center/cover no-repeat;

  color:white;
  font-family:'Poppins', sans-serif;
}

.card {
  max-width: 600px;
  padding: 30px;
  border-radius: 20px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);

  opacity:0;
  transform: translateY(30px);
  animation: fadeUp 2s ease forwards;
}

h1 {
  font-family: 'Dancing Script', cursive;
  font-size: 40px;
  margin-bottom: 20px;
}

p {
  line-height:1.8;
  font-size:16px;
  opacity:0.9;
  white-space: pre-line;
}

@keyframes fadeUp {
  to {
    opacity:1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>Untuk Nadd 🌙</h1>
  <p id="text"></p>
</div>

<script>

// MESSAGE (guna ayat kau)
const message = `Selamat Hari Raya ✨

Semoga hari-hari awak sentiasa dipenuhi dengan kebahagiaan,
dan senyuman yang tak pernah hilang.

Kadang benda kecil pun boleh buat hari jadi lebih tenang,
harap awak jumpa banyak benda kecil macam tu selalu.

Terima kasih sebab jadi seseorang yang istimewa,
walaupun mungkin awak tak sedar pun 😊

Apa yang saya buat ni mungkin simple je,
tapi harap boleh buat awak tersenyum sikit hari ni`;

// TYPE EFFECT
let i = 0;

function typeEffect() {
  if (i < message.length) {
    let char = message.charAt(i);
    document.getElementById("text").innerHTML += char;
    i++;

    let delay = 55;

    if (char === "," || char === ".") delay = 200;
    if (char === "\n") delay = 500;

    setTimeout(typeEffect, delay);
  }
}

// START lepas card muncul
setTimeout(typeEffect, 1500);

</script>

</body>
</html>
