<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Nadd 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url('background.jpg') center/cover no-repeat;

  color:white;
  font-family:'Poppins', sans-serif;
}

/* CARD */
.card {
  max-width:600px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1 {
  font-family:'Dancing Script', cursive;
  font-size:40px;
}

p {
  white-space:pre-line;
  line-height:1.7;
}

/* ENVELOPE */
.envelope {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%) scale(0.8);

  width:180px;
  height:120px;

  opacity:0;
  cursor:pointer;
  transition:0.5s ease;
}

.envelope.show {
  opacity:1;
  transform:translateX(-50%) scale(1);
}

/* BODY */
.body-env {
  width:100%;
  height:100%;
  background:#fff;
  border-radius:10px;
  position:relative;
  z-index:1;
}

/* FLAP */
.flap {
  position:absolute;
  width:100%;
  height:100%;
  background:#e5e5e5;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.6s ease;
  z-index:2;
}

/* OPEN */
.envelope.open .flap {
  transform:rotateX(180deg);
}

/* duit preview */
.money {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,20px);
  opacity:0;
  font-size:16px;
  color:#14532d;
  font-weight:bold;
  transition:0.5s;
  z-index:0;
}

.envelope.open .money {
  transform:translate(-50%,-40px);
  opacity:1;
}
</style>
</head>

<body>

<div class="card">
  <h1>Untuk Nadd 🌙</h1>
  <p id="text"></p>
</div>

<div id="envelope" class="envelope">
  <div class="flap"></div>
  <div class="body-env"></div>
  <div class="money">💵 Untuk Nadd</div>
</div>

<audio id="sound" src="sound.mp3"></audio>

<script>

const message = `Selamat Hari Raya ✨

Semoga hari-hari Nadd sentiasa dipenuhi dengan kebahagiaan,
dan senyuman yang takkan pernah hilang.

Kadang benda kecil pun boleh buat hari jadi lebih tenang,

Kalau ada apa-apa yang pernah buat Nadd terasa,
Minta maaf yaa🙏🏻
Mungkin ada kata-kata atau perbuatan yang tak sepatutnya
Harap boleh dimaafkan ya

Semoga segalanya akan menjadi lebih baik dari sebelumnya..✨`;

let i = 0;

function typeEffect(){
  const textEl = document.getElementById("text");

  if(i < message.length){
    let char = message.charAt(i);
    textEl.innerHTML += char;
    i++;

    let delay = 60;
    if(char === "\n") delay = 300;

    setTimeout(typeEffect, delay);

  } else {
    showEnvelope();
  }
}

function showEnvelope(){
  const env = document.getElementById("envelope");

  setTimeout(()=>{
    env.classList.add("show");
  },1200);
}

document.getElementById("envelope").onclick = () => {
  const env = document.getElementById("envelope");

  env.classList.add("open");
  document.getElementById("sound").play();

  setTimeout(()=>{
    window.location.href = "duit.html";
  },1800);
};

setTimeout(typeEffect,1000);

</script>

</body>
</html>
