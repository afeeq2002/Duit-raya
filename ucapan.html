<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Nadd 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  overflow:hidden;
  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url('background.jpg') center/cover no-repeat;
  color:white;
  font-family:'Poppins', sans-serif;
}

/* TEXT */
.text-center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-65%);
  max-width:600px;
  text-align:center;
  opacity:0;
}

.text-center.show {
  animation: textIn 1.2s cubic-bezier(0.22,1,0.36,1) forwards;
}

@keyframes textIn {
  0% {
    opacity:0;
    transform:translate(-50%,-75%);
  }
  100% {
    opacity:1;
    transform:translate(-50%,-50%);
  }
}

h1 {
  font-family:'Dancing Script', cursive;
  font-size:40px;
}

p {
  white-space:pre-line;
  line-height:1.7;
}

/* ENVELOPE DROP (FIXED) */
.envelope {
  position:fixed;
  left:50%;
  bottom:80px;
  transform:translate(-50%, -300px) scale(0.7);
  width:260px;
  height:160px;
  opacity:0;
  cursor:pointer;
}

.envelope.show {
  opacity:1;
  animation: dropBounce 1.4s cubic-bezier(0.22,1,0.36,1) forwards,
             glowPulse 2.5s infinite 1.4s;
}

@keyframes dropBounce {
  0% {
    opacity:0;
    transform:translate(-50%, -300px) scale(0.7);
  }
  60% {
    opacity:1;
    transform:translate(-50%, 15px) scale(1.05);
  }
  80% {
    transform:translate(-50%, -6px) scale(0.98);
  }
  100% {
    opacity:1;
    transform:translate(-50%, 0) scale(1);
  }
}

@keyframes glowPulse {
  0% { box-shadow:0 0 15px rgba(255,215,0,0.2); }
  50% { box-shadow:0 0 30px rgba(255,215,0,0.5); }
  100% { box-shadow:0 0 15px rgba(255,215,0,0.2); }
}

.body-env {
  width:100%;
  height:100%;
  background: linear-gradient(135deg,#064e3b,#065f46);
  border:2px solid gold;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
}

#envText {
  font-family:'Dancing Script';
  font-size:22px;
  color:#facc15;
}

.flap {
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(135deg,#064e3b,#065f46);
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.9s cubic-bezier(0.22,1,0.36,1);
}

.envelope.open .flap {
  transform:rotateX(180deg);
}

/* LIGHT */
.light {
  position:fixed;
  top:50%;
  left:50%;
  width:200px;
  height:200px;
  background:radial-gradient(circle, rgba(255,215,0,0.5), transparent 70%);
  transform:translate(-50%,-50%);
  opacity:0;
}

/* MONEY */
.money-fly {
  position:fixed;
  pointer-events:none;
  animation: burst 2s ease-out forwards;
}

@keyframes burst {
  0% { transform: translate(0,0) scale(0.5); opacity:0; }
  30% { opacity:1; }
  100% { transform: translate(var(--x), var(--y)) scale(1.2); opacity:0; }
}
</style>
</head>

<body>

<div class="text-center">
  <h1>Untuk Nadd 🌙</h1>
  <p id="text"></p>
</div>

<div id="envelope" class="envelope">
  <div class="flap"></div>
  <div class="body-env">
    <div id="envText"></div>
  </div>
</div>

<!-- SOUND -->
<audio id="sound" src="sound.mp3"></audio>
<audio id="bgMusic" src="music.mp3" loop></audio>

<script>
const message = `Selamat Hari Raya ✨

Semoga hari-hari Nadd sentiasa dipenuhi dengan kebahagiaan,
dan senyuman yang takkan pernah hilang.

Kadang benda kecil pun boleh buat hari jadi lebih tenang,

Kalau ada apa-apa yang pernah buat Nadd terasa,
Minta maaf yaa🙏🏻
Mungkin ada kata-kata atau perbuatan yang tak sepatutnya
Harap boleh dimaafkan ya

Semoga segalanya akan menjadi lebih baik dari sebelumnya..✨`;

let i = 0;

function typeEffect(){
  const textEl = document.getElementById("text");

  if(i < message.length){
    let char = message.charAt(i);
    textEl.innerHTML += char;
    i++;

    let delay = 75 + Math.random()*20;

    if(char === "." || char === ",") delay = 110;
    if(char === "\n") delay = 180;
    if(i > message.length - 30) delay = 95;

    setTimeout(typeEffect, delay);

  } else {
    showEnvelope();
  }
}

function typeEnvelopeText(){
  const text = "Selamat Hari Raya ✨";
  const el = document.getElementById("envText");
  let i = 0;

  function type(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 80);
    }
  }
  type();
}

function showEnvelope(){
  const env = document.getElementById("envelope");

  setTimeout(()=>{
    env.classList.add("show");
    setTimeout(typeEnvelopeText,400);
  },1500);
}

document.getElementById("envelope").onclick = () => {
  const env = document.getElementById("envelope");
  env.classList.add("open");

  let s = document.getElementById("sound");
  s.currentTime = 0;
  s.play();

  let light = document.createElement("div");
  light.className = "light";
  document.body.appendChild(light);

  setTimeout(()=> light.style.opacity = "1",100);
  setTimeout(()=> light.style.opacity = "0",900);

  for(let i=0;i<160;i++){
    let d = document.createElement("div");
    d.className = "money-fly";
    d.innerHTML = Math.random() > 0.5 ? "💵" : "💸";

    d.style.left = window.innerWidth/2 + "px";
    d.style.top = window.innerHeight/2 + "px";

    let angle = Math.random()*2*Math.PI;
    let dist = 600 + Math.random()*600;

    d.style.setProperty('--x', Math.cos(angle)*dist + "px");
    d.style.setProperty('--y', Math.sin(angle)*dist + "px");

    document.body.appendChild(d);
    setTimeout(()=>d.remove(),2000);
  }

  setTimeout(()=>{
    window.location.href = "duit.html";
  },2600);
};

/* unlock music */
document.addEventListener("click", () => {
  document.getElementById("bgMusic").play().catch(()=>{});
}, { once: true });

window.onload = () => {
  setTimeout(()=>{
    document.querySelector(".text-center").classList.add("show");

    const music = document.getElementById("bgMusic");
    music.volume = 0.25;
    music.play().catch(()=>{});

    setTimeout(()=> typeEffect(),800);
  },500);
};
</script>

</body>
</html>
