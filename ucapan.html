<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Awak 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('background.jpg') center/cover no-repeat;
  color:white;
  font-family:'Poppins', sans-serif;
}

/* CARD */
.card {
  max-width: 600px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  opacity:0;
  transform: translateY(30px);
  animation: fadeUp 2s ease forwards;
}

.blur-bg { filter: blur(6px); }

@keyframes fadeUp {
  to { opacity:1; transform: translateY(0); }
}

h1 {
  font-family:'Dancing Script', cursive;
  font-size:40px;
}

p {
  white-space: pre-line;
  line-height:1.8;
}

/* ===== SAMPAUL RAYA BESAR ===== */
.envelope {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%) scale(0);

  width:260px;
  height:180px;

  opacity:0;
  cursor:pointer;
  transition:0.6s;
}

.envelope.show {
  opacity:1;
  transform: translate(-50%,-50%) scale(1.4);
}

.envelope.pop {
  transform: translate(-50%,-50%) scale(1);
}

/* body design */
.body-env {
  width:100%;
  height:100%;
  border-radius:12px;

  background:
    radial-gradient(circle, rgba(255,215,0,0.08), transparent 60%),
    linear-gradient(135deg,#0a0a0a,#1a1a1a);

  border:1.5px solid gold;

  box-shadow:
    0 0 30px rgba(255,215,0,0.2),
    inset 0 0 10px rgba(255,255,255,0.05);
}

/* pattern */
.pattern {
  position:absolute;
  width:100%;
  height:100%;
  background-image:
    repeating-linear-gradient(
      45deg,
      rgba(255,215,0,0.05) 0px,
      rgba(255,215,0,0.05) 2px,
      transparent 2px,
      transparent 8px
    );
}

/* line */
.line {
  position:absolute;
  top:50%;
  left:10%;
  width:80%;
  height:1px;
  background:gold;
  opacity:0.4;
}

/* label */
.label {
  position:absolute;
  top:35%;
  width:100%;
  text-align:center;
  font-size:16px;
  color:gold;
  font-family:'Dancing Script', cursive;
}

/* flap */
.flap {
  height:50%;
  background: linear-gradient(135deg,#111,#333);
  clip-path: polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:0.6s;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

/* ===== DUIT ===== */
.money {
  position:fixed;
  font-size:28px;
  animation: flyOut 2s ease-out forwards;
}

@keyframes flyOut {
  0% { transform: translate(0,0); opacity:1; }
  100% { transform: translate(var(--x),var(--y)) rotate(360deg); opacity:0; }
}
</style>
</head>

<body>

<div class="card">
  <h1>Untuk Nadd 🌙</h1>
  <p id="text"></p>
</div>

<!-- SAMPAUL -->
<div id="envelope" class="envelope">
  <div class="flap"></div>
  <div class="body-env"></div>
  <div class="pattern"></div>
  <div class="line"></div>
  <div class="label">Selamat Hari Raya</div>
</div>

<script>

const message = `Selamat Hari Raya ✨

Semoga hari-hari Nadd sentiasa dipenuhi dengan kebahagiaan,
dan senyuman yang takkan pernah hilang.

Kadang benda kecil pun boleh buat hari jadi lebih tenang,

Kalau ada apa-apa yang pernah buat Nadd terasa,
Minta maaf yaa🙏🏻

Semoga segalanya akan menjadi lebih baik ✨`;

let i=0;

function typeEffect(){
  if(i<message.length){
    let char=message.charAt(i);
    text.innerHTML+=char;
    i++;

    let delay=70;
    if(char=="\n") delay=400;

    setTimeout(typeEffect,delay);
  } else {
    let env=document.getElementById("envelope");
    document.querySelector(".card").classList.add("blur-bg");

    setTimeout(()=>{
      env.classList.add("show");
      setTimeout(()=>env.classList.add("pop"),200);
    },400);
  }
}

setTimeout(typeEffect,1500);

/* 💸 MONEY SYSTEM */
function createMoney(x,y){
  let money=document.createElement("div");
  money.className="money";
  money.innerHTML="💸";

  money.style.left=x+"px";
  money.style.top=y+"px";

  let rx=(Math.random()-0.5)*800;
  let ry=Math.random()*800;

  money.style.setProperty('--x',rx+"px");
  money.style.setProperty('--y',ry+"px");

  document.body.appendChild(money);

  setTimeout(()=>money.remove(),2000);
}

function dropMoney(){
  let env=document.getElementById("envelope");
  let rect=env.getBoundingClientRect();

  // burst dari sampul
  for(let i=0;i<40;i++){
    createMoney(rect.left+rect.width/2, rect.top+rect.height/2);
  }

  // hujan duit full screen
  let rain=setInterval(()=>{
    for(let i=0;i<15;i++){
      createMoney(Math.random()*window.innerWidth,-50);
    }
  },200);

  setTimeout(()=>clearInterval(rain),2500);
}

/* CLICK */
envelope.onclick=()=>{
  envelope.classList.add("open");
  dropMoney();

  setTimeout(()=>{
    window.location.href="duit.html";
  },2500);
};

</script>

</body>
</html>
